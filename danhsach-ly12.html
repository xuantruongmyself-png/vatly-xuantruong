<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngân Hàng Đề Thi Vật Lý 12 | Vật Lý Xuân Trường</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --blue: #0b84f3; --blue2: #0066cc;
            --black: #0f0f0f; --gray: #555; --gray2: #888;
            --border: #e5e5e5; --bg: #ffffff; --bg2: #f9f9f9;
        }
        body {
            background: var(--bg); color: var(--black);
            font-family: 'Inter', ui-sans-serif, sans-serif;
            -webkit-font-smoothing: antialiased;
            padding-top: 56px;
        }

        /* ─── NAV (đồng bộ index.html) ─── */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: 56px;
            display: flex; align-items: center; justify-content: space-between; padding: 0 28px;
            background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .nav-left { display: flex; align-items: center; gap: 36px; }
        .nav-logo {
            display: flex; align-items: center; gap: 10px;
            font-size: 15px; font-weight: 700; color: var(--black); text-decoration: none;
        }
        .nav-links { display: flex; gap: 28px; }
        .nav-links a { font-size: 14px; font-weight: 500; color: var(--black); text-decoration: none; transition: color 0.15s; }
        .nav-links a:hover, .nav-links a.active { color: var(--blue); }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-right a { font-size: 14px; color: var(--gray); text-decoration: none; transition: color 0.15s; }
        .nav-right a:hover { color: var(--black); }
        .nav-btn {
            background: var(--black); color: #fff; padding: 7px 16px; border-radius: 6px;
            font-size: 13px; font-weight: 600; text-decoration: none; transition: opacity 0.15s;
        }
        .nav-btn:hover { opacity: 0.8; color: #fff; }

        /* ─── PAGE ─── */
        .container { max-width: 860px; margin: 0 auto; padding: 60px 32px 100px; }

        .page-eyebrow {
            font-family: 'DM Mono', monospace; font-size: 13px;
            text-transform: uppercase; letter-spacing: 2px;
            color: var(--blue); margin-bottom: 14px; display: block; font-weight: 600;
        }
        .page-title {
            font-size: clamp(34px, 5vw, 52px); font-weight: 900;
            letter-spacing: -0.04em; line-height: 1.1; margin-bottom: 14px;
        }
        .page-sub { font-size: 16px; color: var(--gray); line-height: 1.65; margin-bottom: 48px; font-weight: 500; }

        /* ─── EXAM CARDS ─── */
        .exam-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }

        .exam-card {
            background: var(--bg); padding: 28px 32px;
            display: flex; justify-content: space-between; align-items: center; gap: 24px;
            transition: background 0.15s;
            position: relative;
        }
        .exam-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0;
            width: 3px; background: var(--blue); opacity: 0; transition: opacity 0.2s;
        }
        .exam-card:hover { background: var(--bg2); }
        .exam-card:hover::before { opacity: 1; }

        .exam-left { flex: 1; }
        .exam-num {
            font-family: 'DM Mono', monospace; font-size: 13px;
            color: var(--blue); letter-spacing: 1px; margin-bottom: 8px; font-weight: 600;
        }
        .exam-title { font-size: 19px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.01em; }
        .exam-meta { display: flex; gap: 20px; flex-wrap: wrap; }
        .exam-meta span { font-size: 14px; color: var(--gray); display: flex; align-items: center; gap: 6px; font-weight: 500; }
        .exam-meta i { color: var(--blue); }

        .btn-start {
            background: var(--black); color: #fff; padding: 13px 28px; border-radius: 8px;
            font-size: 14px; font-weight: 700; text-decoration: none; border: none; cursor: pointer;
            white-space: nowrap; display: inline-flex; align-items: center; gap: 8px;
            transition: opacity 0.15s;
        }
        .btn-start:hover { opacity: 0.8; color: #fff; }
        .btn-locked {
            background: var(--bg2); color: var(--gray2); padding: 13px 28px; border-radius: 8px;
            font-size: 14px; font-weight: 600; border: 1px solid var(--border);
            white-space: nowrap; cursor: not-allowed;
            display: inline-flex; align-items: center; gap: 8px;
        }

        /* ─── BADGE trạng thái ─── */
        .badge-new {
            background: rgba(11,132,243,0.08); color: var(--blue);
            border: 1px solid rgba(11,132,243,0.2);
            font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 100px;
            letter-spacing: 0.5px; vertical-align: middle; margin-left: 8px;
        }

        @media (max-width: 640px) {
            .navbar { padding: 0 16px; }
            .nav-links { display: none; }
            .container { padding: 40px 16px 80px; }
            .exam-card { flex-direction: column; align-items: flex-start; padding: 20px; }
            .btn-start, .btn-locked { width: 100%; justify-content: center; }
        }
    </style>
  <script src="auth.js"></script>
  <script>
    // Auth guard — chạy trước khi trang load
    (function(){
      var u = null;
      try { u = JSON.parse(localStorage.getItem('vlxt_user_v2')||'null'); } catch(e){}
      if (!u) {
        window.location.replace('login.html?from=' + encodeURIComponent(location.pathname + location.search));
      }
    })();
  </script>
</head>
<body>

<!-- ─── NAV ─── -->
<nav class="navbar">
    <div class="nav-left">
        <a href="index.html" class="nav-logo">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <circle cx="14" cy="14" r="2.8" fill="#0b84f3"/>
                <ellipse cx="14" cy="14" rx="12" ry="5" stroke="#0b84f3" stroke-width="1.3" fill="none" opacity="0.7"/>
                <ellipse cx="14" cy="14" rx="12" ry="5" stroke="#0b84f3" stroke-width="1.3" fill="none" opacity="0.5" transform="rotate(60 14 14)"/>
                <ellipse cx="14" cy="14" rx="12" ry="5" stroke="#0b84f3" stroke-width="1.3" fill="none" opacity="0.5" transform="rotate(-60 14 14)"/>
            </svg>
            Vật Lý Xuân Trường
        </a>
        <div class="nav-links">
            <a href="index.html#courses">Khóa Học</a>
            <a href="danhsach-ly12.html" class="active">Đề Thi</a>
            <a href="trochoi.html">🎮 Trò Chơi</a>
            <a href="hoso.html">👤 Hồ Sơ</a>
            <a href="index.html#schedule">Lịch Live</a>
        </div>
    </div>
    <div class="nav-right">
        <a href="index.html">← Trang chủ</a>
    </div>
</nav>

<!-- ─── CONTENT ─── -->
<div class="container">
    <span class="page-eyebrow">// vật lý 12 · ngân hàng đề</span>
    <h1 class="page-title">Đề Thi Thực Chiến.</h1>
    <p class="page-sub">Hệ thống khảo sát năng lực trực tuyến — thi ngay, chấm điểm tức thì, lưu kết quả lên bảng vàng.</p>

    <div class="exam-list" id="exam-list">
        <div style="text-align:center;padding:52px 20px;color:#888;font-size:15px">
            <i class="fa-solid fa-spinner fa-spin" style="font-size:24px;color:#0b84f3;margin-bottom:14px;display:block"></i>
            Đang tải danh sách đề thi...
        </div>
    </div>
</div>

<script>
const DB_URL = "https://script.google.com/macros/s/AKfycbyqejp4SzgwNsJb3QrTP76C5-6K2MYqv5T1CzPyi6KUOEEsC7GKQLCnR07i0DNbqKBL/exec";

async function loadExams() {
    const list = document.getElementById('exam-list');
    try {
        const r = await fetch(DB_URL + '?type=danhsachde');
        const j = await r.json();
        const exams = (j.ok && j.data) ? j.data : [];

        if (!exams.length) {
            list.innerHTML = '<div style="text-align:center;padding:52px 20px;color:#888;font-size:15px">Chưa có đề thi nào được mở. Thầy đang chuẩn bị nội dung!</div>';
            return;
        }

        list.innerHTML = exams.map((ex, idx) => {
            const num = String(idx + 1).padStart(2, '0');
            const isMo = ex.trangThai === 'mo';
            const soCau = ex.soCau || 0;
            const luotLam = Number(ex.soLuotLam || 0).toLocaleString('vi-VN');
            const thoiGian = ex.thoiGian || 45;

            if (isMo && soCau > 0) {
                return `<div class="exam-card">
                    <div class="exam-left">
                        <div class="exam-num">ĐỀ ${num}</div>
                        <div class="exam-title">
                            ${ex.tenDe || '(chưa đặt tên)'}
                            <span class="badge-new">MỞ</span>
                        </div>
                        <div class="exam-meta">
                            <span><i class="fa-regular fa-clock"></i> ${thoiGian} phút</span>
                            <span><i class="fa-regular fa-file-lines"></i> ${soCau} câu hỏi</span>
                            <span><i class="fa-regular fa-user"></i> ${luotLam} lượt làm</span>
                        </div>
                    </div>
                    <a href="thithu.html?exam=${ex.examId}" class="btn-start">
                        Vào Thi Ngay <i class="fa-solid fa-arrow-right" style="font-size:11px"></i>
                    </a>
                </div>`;
            } else {
                return `<div class="exam-card">
                    <div class="exam-left">
                        <div class="exam-num">ĐỀ ${num}</div>
                        <div class="exam-title">${ex.tenDe || '(chưa đặt tên)'}</div>
                        <div class="exam-meta">
                            <span><i class="fa-regular fa-clock"></i> ${thoiGian} phút</span>
                            <span><i class="fa-regular fa-file-lines"></i> ${soCau} câu hỏi</span>
                            <span><i class="fa-regular fa-user"></i> ${luotLam} lượt làm</span>
                        </div>
                    </div>
                    <button class="btn-locked">
                        <i class="fa-solid fa-lock" style="font-size:11px"></i> Đang cập nhật
                    </button>
                </div>`;
            }
        }).join('');

    } catch(e) {
        list.innerHTML = '<div style="text-align:center;padding:52px 20px;color:#888">Không thể tải danh sách đề. Vui lòng thử lại sau.</div>';
    }
}

loadExams();
</script>
</body>
</html>
