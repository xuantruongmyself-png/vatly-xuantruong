<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thi Thử Thực Chiến | Vật Lý Xuân Trường</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --blue: #0b84f3; --blue2: #0066cc;
            --black: #0f0f0f; --gray: #555; --gray2: #888;
            --border: #e5e5e5; --bg: #ffffff; --bg2: #f9f9f9;
            --green: #16a34a; --red: #dc2626;
        }
        body {
            background: var(--bg2); color: var(--black);
            font-family: 'Inter', ui-sans-serif, sans-serif;
            -webkit-font-smoothing: antialiased; min-height: 100vh;
        }
        math { font-size: 1.1em; } sub, sup { line-height: 0; font-size: 0.78em; }

        /* ─── AUTH OVERLAY ─── */
        .auth-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(255,255,255,0.96); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .auth-box {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 16px; padding: 44px 40px;
            width: 100%; max-width: 420px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.08);
        }
        .auth-logo {
            display: flex; align-items: center; gap: 10px;
            font-size: 15px; font-weight: 700; margin-bottom: 28px;
        }
        .auth-title { font-size: 24px; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 8px; }
        .auth-sub { font-size: 14px; color: var(--gray); margin-bottom: 28px; line-height: 1.6; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 11px 14px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--bg);
            color: var(--black); font-size: 14px; font-family: 'Inter', sans-serif;
            outline: none; transition: border-color 0.15s;
        }
        .form-group input:focus { border-color: var(--blue); }
        .btn-start-exam {
            width: 100%; padding: 13px; border: none; border-radius: 9px;
            background: var(--black); color: #fff;
            font-size: 15px; font-weight: 700; cursor: pointer;
            font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: opacity 0.15s; margin-top: 8px;
        }
        .btn-start-exam:hover { opacity: 0.85; }

        /* ─── QUIZ LAYOUT ─── */
        .quiz-wrap { max-width: 780px; margin: 0 auto; padding: 32px 20px 80px; }
        .hidden { display: none !important; }

        /* Quiz header bar */
        .quiz-topbar {
            background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
            padding: 16px 24px; margin-bottom: 28px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .quiz-topbar-left { display: flex; align-items: center; gap: 10px; }
        .quiz-topbar-logo {
            display: flex; align-items: center; gap: 8px;
            font-size: 14px; font-weight: 700; color: var(--black);
        }
        .quiz-title-text { font-size: 13px; color: var(--gray); font-weight: 500; }
        #timer {
            font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 700;
            color: var(--red); background: rgba(220,38,38,0.06);
            padding: 7px 16px; border-radius: 7px; border: 1px solid rgba(220,38,38,0.15);
        }

        /* Loading */
        #loading-text { text-align: center; padding: 40px; color: var(--blue); font-weight: 600; font-size: 14px; }

        /* ─── PHẦN TIÊU ĐỀ ─── */
        .part-title {
            background: var(--black); color: #fff;
            padding: 10px 16px; border-radius: 8px;
            font-weight: 700; margin: 26px 0 14px; font-size: 14px;
        }

        /* ─── CÂU HỎI ─── */
        .question-block {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 28px; margin-bottom: 16px;
            transition: border-color 0.15s;
        }
        .question-block:hover { border-color: #c0c0c0; }
        .question-num {
            font-family: 'DM Mono', monospace; font-size: 13px;
            color: var(--blue); letter-spacing: 1px; margin-bottom: 10px; font-weight: 700;
        }
        .question-text { font-size: 17px; line-height: 1.7; font-weight: 600; margin-bottom: 20px; }
        .question-text img, .tf-text img, .q-context img {
            max-width: 100%; border-radius: 8px; margin: 10px 0; display: block;
            border: 1px solid var(--border); background: #fff;
        }

        /* Context block */
        .q-context {
            background: #eff6ff; border-left: 4px solid var(--blue);
            padding: 12px 16px; margin-bottom: 12px; border-radius: 6px;
            font-size: 16px; line-height: 1.6; color: #1e3a5f;
        }

        /* ─── ĐÁP ÁN A/B/C/D ─── */
        .options-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .options-list label {
            display: flex; align-items: center; gap: 14px; padding: 14px 18px;
            border: 1.5px solid var(--border); border-radius: 8px;
            cursor: pointer; transition: border-color 0.15s, background 0.15s;
            font-size: 15px; line-height: 1.6; font-weight: 500;
        }
        .options-list label:hover { border-color: var(--blue); background: rgba(11,132,243,0.03); }
        .options-list input[type="radio"] { accent-color: var(--blue); width: 16px; height: 16px; flex-shrink: 0; }
        .opt-letter { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700; color: var(--gray2); width: 20px; flex-shrink: 0; }

        /* ─── ĐÚNG / SAI ─── */
        .tf-instruction { font-size: 13px; color: var(--blue); font-weight: 600; margin-bottom: 10px; }
        .tf-statement {
            display: flex; justify-content: space-between; align-items: center;
            gap: 14px; padding: 12px 16px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px;
        }
        .tf-text { flex: 1; line-height: 1.55; font-size: 15px; }
        .tf-opts { display: flex; gap: 8px; flex-shrink: 0; }
        .tf-opts label {
            padding: 7px 16px; border: 1px solid var(--border); border-radius: 20px;
            cursor: pointer; font-weight: 600; font-size: 14px;
            display: inline-flex; align-items: center;
        }
        .tf-opts input { display: none; }
        .tf-opts label.dpick { background: #d1f4e0; border-color: var(--green); color: #15803d; }
        .tf-opts label.spick { background: #fee2e2; border-color: var(--red); color: #b91c1c; }

        /* ─── TRẢ LỜI NGẮN ─── */
        .short-wrap { font-weight: 600; display: flex; align-items: center; gap: 10px; font-size: 15px; }
        .short-input {
            padding: 10px 14px; border: 2px solid var(--blue); border-radius: 8px;
            font-size: 16px; width: 160px; text-align: center; outline: none;
            font-family: 'Inter', sans-serif;
        }

        /* ─── NÚT NỘP BÀI ─── */
        #submit-btn {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            background: var(--black); color: #fff;
            font-size: 16px; font-weight: 700; cursor: pointer;
            font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: opacity 0.15s; margin-top: 12px;
        }
        #submit-btn:hover { opacity: 0.85; }

        /* ─── KẾT QUẢ & XEM LẠI ─── */
        .rv-summary {
            background: linear-gradient(135deg, #eff6ff, #f0fdf4);
            border: 1px solid #bfdbfe; border-radius: 12px;
            padding: 28px; margin-bottom: 20px; text-align: center;
        }
        .rv-summary h2 { color: var(--blue); margin: 0 0 8px; font-size: 22px; font-weight: 900; }
        .rv-score { font-size: 48px; font-weight: 900; color: var(--green); line-height: 1.1; }
        .rv-score span { font-size: 18px; color: var(--gray); font-weight: 600; }
        .rv-summary p { margin: 10px 0 0; font-size: 15px; color: var(--black); }
        .rv-summary .rv-save { font-weight: 600; }
        .rv-summary .rv-hint { font-size: 13.5px; color: var(--gray); margin-top: 8px; }

        .rv-block {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 22px; margin-bottom: 14px;
        }
        .rv-block.ok { border-left: 4px solid var(--green); background: #f0fdf4; }
        .rv-block.bad { border-left: 4px solid var(--red); background: #fff5f5; }
        .rv-q { font-size: 17px; font-weight: 600; line-height: 1.6; margin-bottom: 14px; }
        .rv-q img, .rv-opt img { max-width: 100%; height: auto; border-radius: 6px; background: #fff; }
        .rv-badge {
            display: inline-block; font-size: 13px; font-weight: 700;
            padding: 2px 11px; border-radius: 12px; margin-left: 6px;
            vertical-align: middle; white-space: nowrap;
        }
        .rv-badge.ok { background: #d1f4e0; color: #15803d; }
        .rv-badge.bad { background: #fee2e2; color: #b91c1c; }
        .rv-opt {
            padding: 10px 14px; border: 1px solid var(--border);
            border-radius: 8px; margin-bottom: 8px; line-height: 1.55; font-size: 15px;
        }
        .rv-opt.correct { background: #d1f4e0; border-color: var(--green); }
        .rv-opt.chosen-wrong { background: #fee2e2; border-color: var(--red); }
        .rv-tag { font-size: 13px; font-weight: 700; white-space: nowrap; }
        .rv-line { font-size: 14.5px; margin-top: 6px; color: var(--black); }
        .rv-line .lbl { color: var(--gray2); }

        #result-box {
            margin-top: 24px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 12px; padding: 28px;
            border-left: 4px solid var(--green);
        }
        #result-box h3 { font-size: 20px; font-weight: 800; margin-bottom: 12px; }
        #score-text { font-size: 15px; line-height: 1.7; color: var(--gray); font-weight: 500; }

        @media (max-width: 600px) {
            .quiz-topbar { flex-direction: column; gap: 12px; align-items: flex-start; }
            .auth-box { padding: 28px 20px; }
            .tf-statement { flex-direction: column; align-items: flex-start; }
        }
    </style>
  <script src="auth.js"></script>
  <script>
    // Auth guard — chạy trước khi trang load
    (function(){
      var u = null;
      try { u = JSON.parse(localStorage.getItem('vlxt_user_v2')||'null'); } catch(e){}
      if (!u) {
        window.location.replace('login.html?from=' + encodeURIComponent(location.pathname + location.search));
      }
    })();
  </script>
</head>
<body>

<!-- ─── AUTH OVERLAY ─── -->
<div id="auth-screen" class="auth-overlay">
    <div class="auth-box">
        <div class="auth-logo">
            <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
                <circle cx="14" cy="14" r="2.8" fill="#0b84f3"/>
                <ellipse cx="14" cy="14" rx="12" ry="5" stroke="#0b84f3" stroke-width="1.3" fill="none" opacity="0.7"/>
                <ellipse cx="14" cy="14" rx="12" ry="5" stroke="#0b84f3" stroke-width="1.3" fill="none" opacity="0.5" transform="rotate(60 14 14)"/>
                <ellipse cx="14" cy="14" rx="12" ry="5" stroke="#0b84f3" stroke-width="1.3" fill="none" opacity="0.5" transform="rotate(-60 14 14)"/>
            </svg>
            Vật Lý Xuân Trường
        </div>
        <h2 class="auth-title">Thông tin thí sinh</h2>
        <p class="auth-sub">Điền đúng thông tin để hệ thống ghi nhận điểm lên Bảng Vàng vinh danh.</p>
        <div class="form-group">
            <label>Họ và Tên <span style="color:var(--red)">*</span></label>
            <input type="text" id="student-name" placeholder="Ví dụ: Nguyễn Văn Ánh" required>
        </div>
        <div class="form-group">
            <label>Trường / Lớp <span style="color:var(--red)">*</span></label>
            <input type="text" id="student-class" placeholder="Ví dụ: 12A1 - THPT Chuyên" required>
        </div>
        <div class="form-group">
            <label>Số điện thoại / Zalo <span style="color:var(--red)">*</span></label>
            <input type="tel" id="student-phone" placeholder="Ví dụ: 0987654321" required>
        </div>
        <button class="btn-start-exam" id="start-btn" onclick="startQuiz()">
            <i class="fa-solid fa-circle-play"></i> Bắt Đầu Làm Bài
        </button>
    </div>
</div>

<!-- ─── QUIZ CONTENT ─── -->
<div class="quiz-wrap hidden" id="main-quiz-content">

    <div class="quiz-topbar">
        <div class="quiz-topbar-left">
            <div class="quiz-topbar-logo">
                <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
                    <circle cx="14" cy="14" r="2.8" fill="#0b84f3"/>
                    <ellipse cx="14" cy="14" rx="12" ry="5" stroke="#0b84f3" stroke-width="1.3" fill="none" opacity="0.7"/>
                    <ellipse cx="14" cy="14" rx="12" ry="5" stroke="#0b84f3" stroke-width="1.3" fill="none" opacity="0.5" transform="rotate(60 14 14)"/>
                    <ellipse cx="14" cy="14" rx="12" ry="5" stroke="#0b84f3" stroke-width="1.3" fill="none" opacity="0.5" transform="rotate(-60 14 14)"/>
                </svg>
                Vật Lý Xuân Trường
            </div>
            <span style="color:var(--border)">·</span>
            <span class="quiz-title-text">HỆ THỐNG THI THỰC CHIẾN</span>
        </div>
        <div id="timer">Thời gian: 50:00</div>
    </div>

    <div id="loading-text" class="hidden">
        <i class="fa-solid fa-spinner fa-spin"></i>&nbsp; Đang tải đề thi từ kho quản trị...
    </div>

    <div id="quiz-questions"></div>

    <button id="submit-btn" onclick="submitQuiz()" class="hidden">
        <i class="fa-solid fa-paper-plane"></i> Nộp Bài Lên Hệ Thống
    </button>

    <div id="result-box" class="hidden">
        <h3>Kết Quả Của Bạn:</h3>
        <p id="score-text"></p>
    </div>
</div>

<script>
    const databaseUrl = "https://script.google.com/macros/s/AKfycbxJ8HMtU0d8PNGo9cPCat4GMGsd8FyXU_tKPyFot0EHStitH2Eyaefz8V39x9aeo2B_/exec";
    // Lấy examId từ URL param ?exam=de01
    const _examId = new URLSearchParams(location.search).get('exam') || 'de01';
    let studentData = { name:"", class:"", phone:"" };
    let timeLeft = 2700; // 45 phút mặc định — ghi đè từ metadata đề nếu có
    let countdown;
    let myQuestions = [];
    const TYPE_TITLE = { mc:'PHẦN I. Trắc nghiệm nhiều phương án (A/B/C/D)', tf:'PHẦN II. Trắc nghiệm Đúng/Sai', short:'PHẦN III. Trắc nghiệm trả lời ngắn' };
    const SUBLABEL = { A:'a)', B:'b)', C:'c)', D:'d)' };

    // Auto-fill form từ tài khoản đã đăng nhập
    (function(){
      try {
        const u = JSON.parse(localStorage.getItem('vlxt_user_v2')||'null');
        if(u) {
          document.getElementById('student-name').value = u.hoten || '';
          document.getElementById('student-class').value = u.lop || '';
          document.getElementById('student-phone').value = u.sdt || u.email || '';
          // Nếu đã có đủ thông tin, tự động bỏ qua form
          if(u.hoten && (u.lop || u.email) && (u.sdt || u.email)) {
            const studentName = u.hoten;
            const studentClass = u.lop || 'Google';
            const studentPhone = u.sdt || u.email;
            window._autoAuth = { name: studentName, class: studentClass, phone: studentPhone };
          }
        }
      } catch(e){}
    })();

    function startQuiz(){
        const name=document.getElementById('student-name').value.trim();
        const sClass=document.getElementById('student-class').value.trim();
        const phone=document.getElementById('student-phone').value.trim();
        if(!name||!sClass||!phone){ alert("Vui lòng điền đầy đủ tất cả thông tin trước khi vào thi!"); return; }
        studentData={ name, class:sClass, phone };
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-quiz-content').classList.remove('hidden');
        fetchQuestionsFromAdmin();
    }

    // Nếu đã đăng nhập đủ thông tin thì tự động bắt đầu
    window.addEventListener('DOMContentLoaded', function(){
      if(window._autoAuth) {
        studentData = window._autoAuth;
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-quiz-content').classList.remove('hidden');
        fetchQuestionsFromAdmin();
      }
    });

    async function fetchQuestionsFromAdmin(){
        document.getElementById('loading-text').classList.remove('hidden');
        try {
            // Lấy metadata đề (thời gian thi) song song với câu hỏi
            const [qRes, metaRes] = await Promise.all([
                fetch(databaseUrl + '?type=examquestions&examId=' + _examId),
                fetch(databaseUrl + '?type=danhsachde')
            ]);
            const data = await qRes.json();
            // Áp dụng thời gian thi từ metadata nếu có
            try {
                const meta = await metaRes.json();
                if (meta.ok && meta.data) {
                    const examInfo = meta.data.find(e => e.examId === _examId);
                    if (examInfo && examInfo.thoiGian) {
                        timeLeft = parseInt(examInfo.thoiGian) * 60;
                    }
                }
            } catch(e) {}
            myQuestions = Array.isArray(data) ? data : [];
            myQuestions.forEach(q=>{ if(!q.options) q.options={A:'',B:'',C:'',D:''}; q.type = normalizeType(q); });
            document.getElementById('loading-text').classList.add('hidden');
            document.getElementById('submit-btn').classList.remove('hidden');
            // Tăng lượt làm (fire-and-forget, no-cors)
            fetch(databaseUrl, { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({action:'incrementLam', examId:_examId}) });
            loadQuiz(); startTimer();
        } catch(err) {
            console.error("Lỗi lấy đề:",err);
            document.getElementById('quiz-questions').innerHTML="<p style='color:var(--red);text-align:center;padding:40px'>Không thể tải được đề thi. Thầy đang bảo trì kho đề!</p>";
            document.getElementById('loading-text').classList.add('hidden');
        }
    }

    function normalizeType(q){
        const tp=(q.type||'').toString().toLowerCase().trim();
        if(tp==='mc'||tp==='tf'||tp==='short') return tp;
        const c=(q.correct==null?'':q.correct).toString().trim();
        if(/^[ĐSđs]{2,4}$/.test(c)) return 'tf';
        if(/^[A-D]$/i.test(c)) return 'mc';
        const filled=['A','B','C','D'].filter(L=>q.options[L]&&q.options[L].toString().trim()).length;
        if(filled<=1 && c!=='') return 'short';
        return 'mc';
    }

    function loadQuiz(){
        const container=document.getElementById('quiz-questions');
        let html=''; let lastType=null;
        myQuestions.forEach(q=>{
            if(q.type!==lastType){ html+=`<div class="part-title">${TYPE_TITLE[q.type]||''}</div>`; lastType=q.type; }
            const qText = fixNuclearNotation(q.question);
            html+=`<div class="question-block"><div class="question-num">CÂU ${q.id}</div><div class="question-text">${qText}</div>`;
            if(q.type==='tf'){
                html+='<div class="tf-instruction">Chọn Đúng hoặc Sai cho mỗi ý:</div>';
                ['A','B','C','D'].forEach(L=>{ if(!q.options[L]||!q.options[L].trim()) return;
                    const optText = fixNuclearNotation(q.options[L]);
                    html+=`<div class="tf-statement"><div class="tf-text">${SUBLABEL[L]} ${optText}</div>
                      <div class="tf-opts">
                        <label data-g="q${q.id}_${L}" data-v="Đ"><input type="radio" name="q${q.id}_${L}" value="Đ"><span>Đúng</span></label>
                        <label data-g="q${q.id}_${L}" data-v="S"><input type="radio" name="q${q.id}_${L}" value="S"><span>Sai</span></label>
                      </div></div>`; });
            } else if(q.type==='short'){
                html+=`<div class="short-wrap"><i class="fa-solid fa-keyboard" style="color:var(--blue)"></i> Đáp án của bạn: <input type="text" class="short-input" name="q${q.id}" maxlength="6" placeholder="Nhập số"></div>`;
            } else {
                html+='<ul class="options-list">';
                ['A','B','C','D'].forEach(L=>{ if(q.options[L]===undefined) return;
                    const optText = fixNuclearNotation(q.options[L]);
                    html+=`<li><label><input type="radio" name="q${q.id}" value="${L}"><span class="opt-letter">${L}.</span> ${optText}</label></li>`; });
                html+='</ul>';
            }
            html+='</div>';
        });
        container.innerHTML=html;
        container.querySelectorAll('.tf-opts label').forEach(lb=>{ lb.addEventListener('click',()=>{
            const g=lb.dataset.g, v=lb.dataset.v;
            container.querySelectorAll(`.tf-opts label[data-g="${g}"]`).forEach(x=>x.classList.remove('dpick','spick'));
            lb.classList.add(v==='Đ'?'dpick':'spick');
        }); });
        setTimeout(()=>{ if(typeof renderMathInElement==='function'){ try{ renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]}); }catch(e){} } },100);
    }

    function startTimer(){
        const el=document.getElementById('timer');
        countdown=setInterval(()=>{
            if(timeLeft<=0){ clearInterval(countdown); el.innerHTML="HẾT GIỜ!"; submitQuiz(); }
            else { let m=Math.floor(timeLeft/60), s=timeLeft%60; s=s<10?'0'+s:s; el.innerHTML=`Thời gian: ${m}:${s}`; timeLeft--; }
        },1000);
    }

    function fixNuclearNotation(html){
        if(!html) return html;
        html = html.replace(/<sup>([^<]+)<\/sup>\s*<sub>([^<]+)<\/sub>\s*([A-Za-zÀ-ỹ]{1,3})/g,
            (_, a, z, x) => '${}^{' + a + '}_{' + z + '}\\text{' + x + '}$');
        html = html.replace(/<sub>([^<]+)<\/sub>\s*<sup>([^<]+)<\/sup>\s*([A-Za-zÀ-ỹ]{1,3})/g,
            (_, z, a, x) => '${}^{' + a + '}_{' + z + '}\\text{' + x + '}$');
        return html;
    }

    function normNum(s){ return (s==null?'':s).toString().trim().replace(/\s/g,'').replace(',','.'); }
    function escHtml(s){ return (s==null?'':s).toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    const DS_TXT = { 'Đ':'Đúng', 'S':'Sai' };

    function submitQuiz(){
        clearInterval(countdown);
        let score=0, max=0; const W_MC=0.25, W_SHORT=0.25; const tfScheme={0:0,1:0.1,2:0.25,3:0.5,4:1};
        let nCorrectQ=0; let lastType=null; let reviewHtml='';
        myQuestions.forEach(q=>{
            if(q.type!==lastType){ reviewHtml+=`<div class="part-title">${TYPE_TITLE[q.type]||''}</div>`; lastType=q.type; }
            if(q.type==='tf'){
                max+=1;
                const corr=(q.correct||'').toString();
                const letters=['A','B','C','D'].filter(L=>q.options[L]&&q.options[L].trim());
                let nc=0; let rows='';
                letters.forEach(L=>{
                    const pos={A:0,B:1,C:2,D:3}[L]; const want=corr[pos]||'S';
                    const sel=document.querySelector(`input[name="q${q.id}_${L}"]:checked`);
                    const got=sel?sel.value:''; const ok=got===want; if(ok) nc++;
                    const gotTxt = got===''? '<i>chưa chọn</i>' : (DS_TXT[got]||got);
                    rows+=`<div class="rv-opt ${ok?'correct':'chosen-wrong'}">${SUBLABEL[L]} ${fixNuclearNotation(q.options[L])}
                        <div class="rv-line"><span class="lbl">Bạn chọn:</span> ${gotTxt} &nbsp;·&nbsp; <span class="lbl">Đáp án:</span> <b>${DS_TXT[want]||want}</b> <span class="rv-tag" style="color:${ok?'var(--green)':'var(--red)'}">${ok?'✔':'✘'}</span></div></div>`;
                });
                score += (tfScheme[nc]!==undefined?tfScheme[nc]:0);
                const allOk = nc===letters.length && letters.length>0; if(allOk) nCorrectQ++;
                reviewHtml+=`<div class="rv-block ${allOk?'ok':'bad'}"><div class="rv-q">Câu ${q.id}: ${fixNuclearNotation(q.question)} <span class="rv-badge ${allOk?'ok':'bad'}">${nc}/${letters.length} ý đúng</span></div>${rows}</div>`;
            } else if(q.type==='short'){
                max+=W_SHORT;
                const inp=document.querySelector(`input[name="q${q.id}"]`);
                const val=inp?inp.value:''; const a=normNum(val), b=normNum(q.correct);
                const ok = a!==''&&a===b; if(ok){ score+=W_SHORT; nCorrectQ++; }
                reviewHtml+=`<div class="rv-block ${ok?'ok':'bad'}"><div class="rv-q">Câu ${q.id}: ${fixNuclearNotation(q.question)} <span class="rv-badge ${ok?'ok':'bad'}">${ok?'✔ Đúng':'✘ Sai'}</span></div>
                    <div class="rv-line"><span class="lbl">Bạn trả lời:</span> <b>${val.trim()?escHtml(val):'(bỏ trống)'}</b></div>
                    <div class="rv-line"><span class="lbl">Đáp án đúng:</span> <b style="color:var(--green)">${escHtml(q.correct||'')}</b></div></div>`;
            } else {
                max+=W_MC;
                const sel=document.querySelector(`input[name="q${q.id}"]:checked`);
                const got=sel?sel.value:''; const ok = got===q.correct; if(ok){ score+=W_MC; nCorrectQ++; }
                let opts='';
                ['A','B','C','D'].forEach(L=>{ if(q.options[L]===undefined||q.options[L]==='') return;
                    const isCorrect = L===q.correct; const isChosenWrong = (L===got && got!==q.correct);
                    let tag=''; if(isCorrect) tag+=' <span class="rv-tag" style="color:var(--green)">✔ Đáp án đúng</span>';
                    if(L===got) tag+=' <span class="rv-tag" style="color:var(--gray2)">(Bạn chọn)</span>';
                    opts+=`<div class="rv-opt ${isCorrect?'correct':''} ${isChosenWrong?'chosen-wrong':''}">${L}. ${fixNuclearNotation(q.options[L])}${tag}</div>`;
                });
                if(got==='') opts+=`<div class="rv-line" style="color:var(--gray2)"><i>Bạn chưa trả lời câu này.</i></div>`;
                reviewHtml+=`<div class="rv-block ${ok?'ok':'bad'}"><div class="rv-q">Câu ${q.id}: ${fixNuclearNotation(q.question)} <span class="rv-badge ${ok?'ok':'bad'}">${ok?'✔ Đúng':'✘ Sai'}</span></div>${opts}</div>`;
            }
        });
        score=Math.round(score*100)/100; max=Math.round(max*100)/100;
        const totalQ=myQuestions.length;
        const summary=`<div class="rv-summary">
            <h2>Kết Quả Của Bạn</h2>
            <div class="rv-score">${score} <span>/ ${max} điểm</span></div>
            <p>Thí sinh <strong>${escHtml(studentData.name)}</strong> (${escHtml(studentData.class)}) · Trả lời đúng <strong>${nCorrectQ}/${totalQ}</strong> câu.</p>
            <p id="save-status" class="rv-save"><i class="fa-solid fa-spinner fa-spin" style="color:var(--blue)"></i> Đang gửi điểm lên Bảng Vàng...</p>
            <p class="rv-hint">Bên dưới là đáp án chi tiết — <span style="color:var(--green);font-weight:700">xanh = đúng</span>, <span style="color:var(--red);font-weight:700">đỏ = bạn chọn sai</span>.</p>
        </div>`;
        const container=document.getElementById('quiz-questions');
        container.innerHTML = summary + '<div class="part-title" style="margin-top:6px"><i class="fa-solid fa-list-check"></i> ĐÁP ÁN CHI TIẾT</div>' + reviewHtml;
        document.getElementById('submit-btn').classList.add('hidden');
        document.getElementById('result-box').classList.add('hidden');
        document.getElementById('timer').innerHTML='<i class="fa-solid fa-circle-check"></i> Đã nộp bài';
        window.scrollTo({top:0,behavior:'smooth'});
        setTimeout(()=>{ if(typeof renderMathInElement==='function'){ try{ renderMathInElement(container,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]}); }catch(e){} } },60);
        const payload={ name:studentData.name, studentClass:studentData.class, phone:studentData.phone, score:`${score}/${max}` };
        fetch(databaseUrl,{ method:"POST", mode:"no-cors", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(payload) })
        .then(()=>{ const s=document.getElementById('save-status'); if(s) s.innerHTML='<i class="fa-solid fa-circle-check" style="color:var(--green)"></i> Đã lưu điểm lên Bảng Vàng thành công!'; })
        .catch(err=>{ console.error("Lỗi gửi dữ liệu:",err); const s=document.getElementById('save-status'); if(s) s.innerHTML='<span style="color:var(--red)">Gặp sự cố khi lưu điểm tự động. Thầy/cô có thể ghi nhận thủ công.</span>'; });
    }
</script>
